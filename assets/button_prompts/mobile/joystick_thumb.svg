<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="thumbFill" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.30"/>
    </radialGradient>
    <filter id="thumbShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- shadow layer -->
  <circle cx="24" cy="24" r="20" fill="rgba(0,0,0,0.3)" filter="url(#thumbShadow)"/>
  <!-- main thumb -->
  <circle cx="24" cy="24" r="20" fill="url(#thumbFill)" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.5"/>
  <!-- top highlight -->
  <ellipse cx="24" cy="18" rx="10" ry="6" fill="#ffffff" fill-opacity="0.08"/>
</svg>
