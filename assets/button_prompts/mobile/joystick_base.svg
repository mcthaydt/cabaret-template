<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <radialGradient id="baseFill" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="48%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="85%" stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </radialGradient>
  </defs>
  <!-- outer ring -->
  <circle cx="90" cy="90" r="86" fill="url(#baseFill)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
  <!-- inner glow ring -->
  <circle cx="90" cy="90" r="84" fill="url(#innerGlow)"/>
  <!-- dashed guide ring -->
  <circle cx="90" cy="90" r="60" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1" stroke-dasharray="4 8"/>
  <!-- directional arrows -->
  <g fill="#ffffff" fill-opacity="0.25">
    <!-- up -->
    <polygon points="90,18 82,30 98,30"/>
    <!-- down -->
    <polygon points="90,162 82,150 98,150"/>
    <!-- left -->
    <polygon points="18,90 30,82 30,98"/>
    <!-- right -->
    <polygon points="162,90 150,82 150,98"/>
  </g>
</svg>
